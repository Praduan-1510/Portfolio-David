<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link rel="stylesheet" href="../shared/base.css" />

<style>
  .screen { height: 852px; }

  .wl-head { padding: 68px 24px 0; }
  .wl-head .title { font-size: 23px; font-weight: 600; line-height: 28px; color: #000; }
  .wl-head .sub { font-size: 13px; font-weight: 400; color: #8a9299; line-height: 19px; margin-top: 2px; }

  .rule2 { height: 2px; background: var(--blue-text); margin-top: 28px; }

  .grid {
    display: grid; grid-template-columns: 167px 167px;
    column-gap: 14px; row-gap: 13px; padding: 18px 21px 0 24px;
  }
  .pcard {
    height: 169px; border: 2px solid var(--blue-text); border-radius: 12px;
    background: var(--mist); padding: 5px; display: flex; flex-direction: column;
  }
  .pimg { position: relative; height: 84px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .pimg img { width: 100%; height: 100%; object-fit: cover; }
  .heart {
    position: absolute; top: 2px; right: 2px; width: 20px; height: 20px;
    border-radius: 50%; background: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .heart svg { width: 12px; height: 12px; }
  .nrow { display: flex; align-items: center; justify-content: space-between; gap: 5px; margin-top: 6px; padding: 0 4px; }
  .pname { font-size: 10.5px; font-weight: 500; letter-spacing: -0.1px; color: #111; white-space: nowrap; }
  .stars { display: flex; gap: 1px; flex-shrink: 0; }
  .stars svg { width: 9px; height: 9px; }
  .prow2 { display: flex; align-items: baseline; gap: 6px; margin-top: 1px; padding: 0 4px; }
  .pprice { font-size: 14px; font-weight: 700; color: #000; }
  .pmrp { font-size: 10.5px; font-weight: 500; color: var(--red); text-decoration: line-through; }
  .cart-btn {
    margin: auto 2px 1px; height: 33px; border-radius: 8px;
    background: var(--navy); color: #fff;
    font-size: 13.5px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }

  /* The original's tab bar row sits 62px above the bottom edge; the white
     bar surface continues to the bottom (shadow only above). */
  .tabbar { position: absolute; left: 0; right: 0; bottom: 0; height: 134px; }
</style>
</head>
