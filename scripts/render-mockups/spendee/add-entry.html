<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .screen { height: 1045px; }
  .body { display: flex; flex-direction: column; padding: 0 16px; }

  /* Interior page header: back disc + eyebrow + title */
  .lede-head { display: flex; align-items: center; gap: 12px; margin: 4px 0 20px; }
  .back-disc {
    width: 38px; height: 38px; border-radius: 999px; background: #fff; color: #000;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .eyebrow { font-size: 11px; letter-spacing: 0.16em; color: #cfcfcf; font-weight: 500; }
  .pg-title { font-family: "Quicksand", sans-serif; font-size: 23px; font-weight: 700; margin-top: 3px; }

  /* Khata-style direction toggle */
  .toggle-row { display: flex; gap: 8px; margin: 0 -9px; }
  .tg {
    flex: 1; height: 40px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 13px; font-weight: 500;
  }
  .tg svg { width: 19px; height: 19px; flex-shrink: 0; }
  .tg.on { background: #1c3013; color: #5bd54a; font-weight: 600; }
  .tg.off { background: #333; color: #d9d9d9; }

  /* Amount */
  .amt-card {
    background: var(--card); border-radius: 20px; height: 78px; margin-top: 12px;
    display: flex; align-items: center; padding: 0 26px;
    font-family: "Quicksand", sans-serif; font-size: 37px; font-weight: 600; letter-spacing: 0.5px;
  }

  /* Form fields */
  .f-label {
    font-family: "Quicksand", sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: 0.13em; color: #f2f2f2; margin: 22px 0 11px 10px;
  }
  .input {
    background: #fff; border-radius: 999px; height: 54px;
    display: flex; align-items: center; padding: 0 25px;
    color: #141414; font-family: "Quicksand", sans-serif; font-size: 20px; font-weight: 600;
    white-space: nowrap;
  }
  .date-row { display: flex; gap: 14px; }
  .date-row > div { flex: 1; }
  .date-row .input { padding: 0 18px; font-size: 17px; }

  /* Payment method tiles */
  .pay-row { display: flex; gap: 10px; }
  .ptile {
    flex: 1; height: 78px; border-radius: 22px; padding: 0 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    font-size: 10px; color: #e8e8e8; text-align: center; line-height: 1.25;
  }
  .ptile svg { width: 23px; height: 23px; }

  /* Attach receipt */
  .attach {
    margin-top: 22px; background: #1c1c1c; border: 2px dashed #4a4a4a; border-radius: 22px;
    padding: 23px 18px 24px; text-align: center;
  }
  .attach svg { width: 36px; height: 36px; margin: 0 auto; }
  .attach .a-title { font-family: "Quicksand", sans-serif; font-size: 25px; font-weight: 600; color: #dedede; margin-top: 10px; }
  .attach .a-sub { font-size: 15px; color: #9a9a9a; margin-top: 5px; }

  /* Save */
  .save-btn {
    margin-top: 18px; height: 56px; border-radius: 999px; background: #c8e7ff; color: #0b0b0b;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: "Quicksand", sans-serif; font-size: 20px; font-weight: 700;
  }
  .save-btn svg { width: 20px; height: 20px; }
</style>
</head>
<body>
<div class="screen">
  <div class="body">
    <!-- Header -->
    <div class="lede-head">
      <div class="back-disc">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </div>
      <div>
        <div class="eyebrow">LEDGER</div>
        <div class="pg-title">New Entry</div>
      </div>
    </div>

    <!-- You Gave / You Got -->
    <div class="toggle-row">
      <div class="tg on">
        <svg viewBox="0 0 24 24" fill="none" stroke="#57c04b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><g transform="translate(12 12) scale(0.52) translate(-12 -12)" stroke-width="3.4"><path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/></g></svg>
        You Gave (Credit)
      </div>
      <div class="tg off">
        <svg viewBox="0 0 24 24" fill="none" stroke="#c9c9c9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><g transform="translate(12 12) scale(0.52) translate(-12 -12)" stroke-width="3.4"><path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/></g></svg>
        You Got (Payment)
      </div>
    </div>

    <!-- Amount -->
    <div class="amt-card">₹ 18,500</div>

    <!-- Contact -->
    <div class="f-label">CONTACT NAME</div>
    <div class="input">Sharma Textiles</div>

    <!-- Dates -->
    <div class="date-row">
      <div>
        <div class="f-label">DATE</div>
        <div class="input">04 Jun 2025</div>
      </div>
      <div>
        <div class="f-label">DUE DATE</div>
        <div class="input">30 Jun 2025</div>
      </div>
    </div>

    <!-- Note -->
    <div class="f-label">NOTE</div>
    <div class="input">Cotton fabric — 40 rolls</div>

    <!-- Payment method -->
    <div class="f-label">PAYMENT METHOD</div>
    <div class="pay-row">
      <div class="ptile" style="background:#48461a">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e8dd5d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>
        UPI
      </div>
      <div class="ptile" style="background:#481a1a">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f07575" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        Cards
      </div>
      <div class="ptile" style="background:#2a481c">
        <svg viewBox="0 0 24 24" fill="none" stroke="#57c04b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><g transform="translate(12 12) scale(0.52) translate(-12 -12)" stroke-width="3.4"><path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/></g></svg>
        Cash on<br/>Delivery
      </div>
      <div class="ptile" style="background:#1d3548">
        <svg viewBox="0 0 24 24" fill="none" stroke="#5fadea" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg>
        Bank
      </div>
    </div>

    <!-- Attach receipt -->
    <div class="attach">
      <svg viewBox="0 0 24 24" fill="none" stroke="#cfcfcf" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3"/></svg>
      <div class="a-title">Attach Receipt</div>
      <div class="a-sub">OCR auto-extract data</div>
    </div>

    <!-- Save -->
    <div class="save-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Save Entry
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tabbar">
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </div>
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      Ledger
    </div>
    <div class="fab" style="box-shadow:0 0 0 5px #202020">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-6h6v6"/></svg>
      Bank
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="5" cy="12" r="1.4" fill="currentColor"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/><circle cx="19" cy="12" r="1.4" fill="currentColor"/></svg>
      More
    </div>
    <div class="base-strip"></div>
  </div>
  <div class="home-indicator"></div>
</div>
</body>
</html>
