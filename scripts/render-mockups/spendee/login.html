<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .screen {
    height: 874px;
    padding: 0;
    font-family: "Quicksand", "Poppins", sans-serif;
  }

  /* ── Logo row ── */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 52px 0 0 44px;
  }
  .logo-tile {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-tile svg { width: 34px; height: 34px; }
  .wordmark {
    font-size: 27px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.01em;
  }

  /* ── Headings ── */
  .hgroup { margin: 89px 0 0 44px; }
  .kicker {
    font-size: 15px;
    font-weight: 500;
    color: #c6c6c6;
    letter-spacing: 0.03em;
  }
  .hgroup h1 {
    font-size: 38px;
    font-weight: 700;
    color: #fff;
    margin-top: 5px;
    letter-spacing: 0.01em;
  }

  /* ── Mobile number ── */
  .field-label {
    margin: 52px 0 0 62px;
    font-size: 15px;
    font-weight: 500;
    color: #cfcfcf;
    letter-spacing: 0.02em;
  }
  .input {
    margin: 12px 0 0 50px;
    width: 302px;
    height: 55px;
    border-radius: 15px;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 0 24px;
  }
  .input .cc { font-size: 15px; font-weight: 600; color: #2c2c2c; }
  .input .div { width: 1.5px; height: 22px; background: #bdbdbd; margin: 0 0 0 16px; }
  .input .num { font-size: 15.5px; font-weight: 600; color: #1c1c1c; margin-left: 22px; letter-spacing: 0.02em; }

  /* ── PIN ── */
  .pin-label { margin-top: 34px; }
  .pin-row {
    display: flex;
    gap: 14px;
    margin: 14px 0 0 78px;
  }
  .pin {
    width: 50px;
    height: 54px;
    border-radius: 13px;
    background: #808080;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pin.filled { background: #2077ba; }
  .pin svg { width: 22px; height: 22px; }

  /* ── Primary CTA ── */
  .cta {
    margin: 50px 0 0 34px;
    width: 334px;
    height: 54px;
    border-radius: 27px;
    background: #c8e7ff;
    color: #14181c;
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .cta svg { width: 20px; height: 20px; }

  /* ── Aux lines ── */
  .aux {
    margin-top: 21px;
    text-align: center;
    font-size: 14.5px;
    font-weight: 500;
    color: #b9b9b9;
    letter-spacing: 0.02em;
  }
  .aux .green-link { color: #84e258; font-weight: 700; }

  /* ── Alt sign-in buttons ── */
  .alt-row {
    display: flex;
    justify-content: space-between;
    margin: 26px 34px 0;
  }
  .alt-btn {
    height: 54px;
    border-radius: 16px;
    background: #141f26;
    color: #f2f2f2;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .alt-btn.google { width: 135px; }
  .alt-btn.bio { width: 160px; }
  .alt-btn svg { width: 22px; height: 22px; }
</style>
</head>
<body>
<div class="screen">
  <!-- Logo -->
  <div class="logo-row">
    <div class="logo-tile">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <g stroke="#e3cf7a" stroke-width="2">
          <path d="M6 3h12"/><path d="M6 8h12"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/>
        </g>
        <path d="m6 13 8.5 8" stroke="#57a8e0" stroke-width="2"/>
      </svg>
    </div>
    <div class="wordmark">Spendee</div>
  </div>

  <!-- Headings -->
  <div class="hgroup">
    <div class="kicker">Welcome Back</div>
    <h1>Sign In</h1>
  </div>

  <!-- Mobile number -->
  <div class="field-label">Mobile Number</div>
  <div class="input">
    <span class="cc">+91</span>
    <span class="div"></span>
    <span class="num">98765 43210</span>
  </div>

  <!-- PIN -->
  <div class="field-label pin-label">4 - Digit PIN</div>
  <div class="pin-row">
    <div class="pin filled">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2.5l2.83 6.1 6.67.72-4.97 4.52 1.35 6.56L12 17.06 6.12 20.4l1.35-6.56L2.5 9.32l6.67-.72z"/></svg>
    </div>
    <div class="pin filled">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2.5l2.83 6.1 6.67.72-4.97 4.52 1.35 6.56L12 17.06 6.12 20.4l1.35-6.56L2.5 9.32l6.67-.72z"/></svg>
    </div>
    <div class="pin"></div>
    <div class="pin"></div>
  </div>

  <!-- Sign in -->
  <div class="cta">
    Sign In
    <svg viewBox="0 0 24 24" fill="none" stroke="#14181c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
  </div>

  <div class="aux">Forgot PIN? <span class="green-link">Reset via OTP</span></div>

  <!-- Alt methods -->
  <div class="alt-row">
    <div class="alt-btn google">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google
    </div>
    <div class="alt-btn bio">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e8e8e8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/><path d="M14 13.12c0 2.38 0 6.38-1 8.88"/><path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/><path d="M2 12a10 10 0 0 1 18-6"/><path d="M2 16h.01"/><path d="M21.8 16c.2-2 .131-5.354 0-6"/><path d="M5 19.5C5.5 18 6 15 6 12a6 6 0 0 1 .34-2"/><path d="M8.65 22c.21-.66.45-1.32.57-2"/><path d="M9 6.8a6 6 0 0 1 9 5.2v2"/></svg>
      Biometrics
    </div>
  </div>

  <div class="aux">New to Spendee? <span class="green-link">Create Account</span></div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
