<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .screen {
    height: 874px;
    padding: 0;
    font-family: "Quicksand", "Poppins", sans-serif;
    align-items: center;
    background:
      radial-gradient(140% 70% at 88% 0%, rgba(10, 118, 198, 0.55) 0%, rgba(10, 118, 198, 0) 55%),
      linear-gradient(90deg, rgba(0, 8, 16, 0.5) 0%, rgba(0, 8, 16, 0.2) 20%, rgba(0, 8, 16, 0) 48%, rgba(0, 8, 16, 0.06) 100%),
      linear-gradient(180deg, #024872 0%, #185270 16%, #255148 33%, #536331 50%, #7f7b0d 68%, #8a8409 80%, #6f6903 100%);
  }

  /* ── Logo ── */
  .logo-tile {
    margin-top: 115px;
    width: 106px;
    height: 106px;
    border-radius: 30px;
    background: linear-gradient(155deg, rgba(110, 175, 225, 0.34), rgba(30, 90, 140, 0.42));
    border: 1.5px solid rgba(255, 255, 255, 0.26);
    box-shadow: 0 10px 30px rgba(0, 20, 40, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-tile svg { width: 58px; height: 58px; }

  .app-name {
    margin-top: 19px;
    font-size: 40px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.01em;
  }
  .tag1 {
    margin-top: 11px;
    font-size: 16.5px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.78);
    letter-spacing: 0.02em;
  }
  .tag2 {
    margin-top: 3px;
    font-size: 16.5px;
    font-weight: 700;
    color: #86e65d;
    letter-spacing: 0.02em;
  }

  /* ── Feature pills ── */
  .pills {
    margin-top: 70px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  .pill {
    width: 302px;
    height: 50px;
    border-radius: 17px;
    background: rgba(255, 255, 255, 0.13);
    border: 1px solid rgba(255, 255, 255, 0.22);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 11px;
    font-size: 13px;
    font-weight: 600;
    color: #f2f4ec;
    letter-spacing: 0.02em;
  }
  .pill svg { width: 20px; height: 20px; }

  /* ── Bottom buttons ── */
  .cta {
    margin-top: 94px;
    width: 334px;
    height: 56px;
    border-radius: 28px;
    background: #c8e7ff;
    color: #0d1319;
    font-size: 17.5px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.01em;
  }
  .btn2 {
    margin-top: 17px;
    width: 334px;
    height: 54px;
    border-radius: 27px;
    background: rgba(255, 255, 255, 0.25);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="screen">
  <!-- Logo -->
  <div class="logo-tile">
    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#e4ce7a" stroke-width="2">
        <path d="M6 3h12"/><path d="M6 8h12"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/>
      </g>
      <path d="m6 13 8.5 8" stroke="#57a8e0" stroke-width="2"/>
    </svg>
  </div>

  <div class="app-name">Spendee</div>
  <div class="tag1">Track effortlessly.</div>
  <div class="tag2">Spend wisely.</div>

  <!-- Feature pills -->
  <div class="pills">
    <div class="pill">
      <svg viewBox="0 0 24 24" fill="#e8cd6e"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Smart ledger with AI insights
    </div>
    <div class="pill">
      <svg viewBox="0 0 24 24" fill="#fff"><path fill-rule="evenodd" d="M6 21V4.5A1.5 1.5 0 0 1 7.5 3h9A1.5 1.5 0 0 1 18 4.5V21h1.4v1.5H4.6V21H6zm3-15.2h2.1v2.1H9V5.8zm3.9 0H15v2.1h-2.1V5.8zM9 9.8h2.1v2.1H9V9.8zm3.9 0H15v2.1h-2.1V9.8zm-2.4 5.4h3V21h-3v-5.8z"/></svg>
      Built-in banking &amp; UPI
    </div>
    <div class="pill">
      <svg viewBox="0 0 24 24" fill="#7ddf5a"><rect x="4" y="13" width="4" height="7" rx="1.2"/><rect x="10" y="9" width="4" height="11" rx="1.2"/><rect x="16" y="5" width="4" height="15" rx="1.2"/></svg>
      GST compliance on autopilot
    </div>
  </div>

  <!-- Bottom buttons -->
  <div class="cta">Get Started Free</div>
  <div class="btn2">I already have an account</div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
