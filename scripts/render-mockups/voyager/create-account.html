<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .screen { height: 874px; background: var(--orange); }

  .topo {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .logo {
    position: absolute;
    left: 114px;
    top: 118px;
    width: 172px;
    height: 172px;
    border-radius: 50%;
    z-index: 1;
  }

  .wordmark {
    position: absolute;
    left: 0;
    right: 0;
    top: 305px;
    text-align: center;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 1px;
    line-height: 1;
    color: #fff;
    z-index: 1;
  }
  .tagline {
    position: absolute;
    left: 0;
    right: 0;
    top: 351px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3.6px;
    line-height: 1;
    color: #1e1e1e;
    z-index: 1;
  }

  .card {
    position: absolute;
    left: 29px;
    top: 378px;
    width: 343px;
    height: 466px;
    border-radius: 26px;
    background: rgba(255, 255, 255, 0.7);
    z-index: 1;
  }
  .card .lbl {
    margin: 10px 0 0 21px;
    font-size: 15px;
    font-weight: 500;
    line-height: 20px;
    color: #7b776e;
  }
  .card .lbl.first { margin-top: 40px; }
  .card .input {
    margin: 9px 19px 0;
    height: 40px;
    border-radius: 12px;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 0 15px 0 17px;
    font-size: 16px;
    font-weight: 500;
    color: #191919;
  }
  .card .input .pw {
    font-size: 17px;
    letter-spacing: 1.5px;
    transform: translateY(3px);
  }
  .card .input .eye { margin-left: auto; }
  .card .input .eye svg { width: 21px; height: 21px; }

  .cta {
    margin: 42px 19px 0;
    height: 40px;
    border-radius: 10px;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15.5px;
    font-weight: 600;
    color: #fff;
  }
  .or {
    margin-top: 14px;
    text-align: center;
    font-size: 13.5px;
    font-weight: 500;
    line-height: 17px;
    color: #6b675e;
  }
  .social {
    display: flex;
    justify-content: space-between;
    margin: 15px 19px 0 20px;
  }
  .social .sbtn {
    width: 139px;
    height: 39px;
    border-radius: 10px;
    background: #fff;
    border: 1px solid #1c1c1c;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    font-size: 15px;
    font-weight: 600;
    color: #101010;
  }
  .social .sbtn svg { width: 18px; height: 18px; }
</style>
</head>
