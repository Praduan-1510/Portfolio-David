<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .screen { height: 986px; }

  /* Light detail sheet: hero photo fades into the #f5f5f5 body */
  .dsheet {
    position: relative;
    margin: 23px 14px 12px;
    border-radius: 30px 30px 28px 28px;
    background: #f5f5f5;
    flex: 1;
    overflow: hidden;
  }
  .dsheet img.hero { width: 374px; height: 387px; }

  .fab {
    position: absolute;
    top: 37px;
    width: 34px;
    height: 33px;
    border-radius: 12px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fab.back { left: 15px; }
  .fab.save { right: 10px; }
  .fab svg { width: 19px; height: 19px; }

  .content { padding: 0 22px; }
  .content h1 {
    margin-top: 14px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.2px;
    line-height: 32px;
    color: #1b2a4e;
  }
  .content .loc {
    margin-top: 5px;
    font-size: 13px;
    font-weight: 400;
    line-height: 18px;
    color: #33405e;
  }

  /* Stats strip: days / rating / booked */
  .stats {
    margin: 21px 9px 0 10px;
    height: 85px;
    border-radius: 22px;
    background: #eee;
    box-shadow: 0 12px 22px rgba(0, 0, 0, 0.07);
    display: flex;
    align-items: center;
  }
  .stats .cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .stats .cell .n { font-size: 21px; font-weight: 600; color: #3a3a3a; }
  .stats .cell .l { font-size: 15px; font-weight: 400; color: #757575; }
  .stats .div { width: 1.5px; height: 48px; background: #b0b0b0; }

  .ov {
    margin-top: 26px;
    display: inline-block;
    font-size: 19px;
    font-weight: 500;
    line-height: 24px;
    color: #4f4f4f;
    padding: 0 4px 6px 0;
    border-bottom: 3px solid var(--orange);
  }
  .content p {
    margin-top: 14px;
    width: 318px;
    font-size: 14.5px;
    font-weight: 400;
    line-height: 22px;
    color: #3d3d3d;
  }

  .chips { margin-top: 17px; display: flex; gap: 20px; }
  .chip {
    height: 36px;
    border-radius: 18px;
    background: #e7e7e7;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 11px;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    color: #666;
  }
  .chip svg { width: 20px; height: 20px; }

  /* Sticky booking footer */
  .foot {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 88px;
    border-top: 1px solid #dcdcdc;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    padding: 0 24px 0 30px;
  }
  .foot .from { font-size: 13.5px; font-weight: 400; line-height: 17px; color: #6f6f6f; }
  .foot .price {
    margin-top: 4px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .foot .price .amt { font-size: 24px; font-weight: 700; letter-spacing: -0.2px; color: #1c1c1c; }
  .foot .price .per { font-size: 13px; font-weight: 400; color: #8a8a8a; }
  .foot .book {
    margin-left: auto;
    width: 136px;
    height: 44px;
    border-radius: 14px;
    background: var(--orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 700;
    color: #101010;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="dsheet">
    <img class="hero" src="../assets/voyager/dd-hero.png" alt="" />

    <div class="fab back">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    </div>
    <div class="fab save">
      <svg viewBox="0 0 24 24" fill="#fca311"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.51 4.04 3 5.5l7 7Z"/></svg>
    </div>

    <div class="content">
      <h1>Paris City Break</h1>
      <div class="loc">Paris, France</div>

      <div class="stats">
        <div class="cell"><span class="n">8</span><span class="l">Days</span></div>
        <div class="div"></div>
        <div class="cell"><span class="n">4.9</span><span class="l">Rating</span></div>
        <div class="div"></div>
        <div class="cell"><span class="n">2.4k</span><span class="l">Booked</span></div>
      </div>

      <div class="ov">Overview</div>
      <p>Experience the magic of the City of Light &mdash; from the iconic Eiffel Tower to hidden Montmartre streets, world-class cuisine, and legendary art museums.</p>

      <div class="chips">
        <div class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="#3c4a63" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
          Flights Included
        </div>
        <div class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="#3c4a63" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
          Hotel Included
        </div>
      </div>
    </div>

    <div class="foot">
      <div>
        <div class="from">Starting from</div>
        <div class="price"><span class="amt">$1,240</span><span class="per">/person</span></div>
      </div>
      <div class="book">Book Now</div>
    </div>
  </div>
</div>
</body>
</html>
