<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .screen { height: 932px; }

  .sheet { overflow: hidden; }

  /* ── Passport hero card ── */
  .passport {
    position: relative;
    background: var(--navy);
    border-radius: 16px;
    margin: 18px 18px 0;
    padding: 22px 22px 24px;
  }
  .passport .eyebrow { letter-spacing: 0.18em; font-size: 11.5px; }
  .passport .pname { margin-top: 11px; font-size: 18px; font-weight: 700; color: #fff; }
  .passport .pno {
    margin-top: 10px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3.5px;
    color: #aab1bd;
  }
  .passport .meta { display: flex; margin-top: 28px; }
  .passport .meta > div:nth-child(1) { width: 108px; }
  .passport .meta > div:nth-child(2) { width: 96px; }
  .passport .ml { font-size: 12px; font-weight: 500; color: var(--dim-dark); }
  .passport .mv { margin-top: 7px; font-size: 14px; font-weight: 700; color: #fff; }
  .qrbox {
    position: absolute;
    top: 22px;
    right: 22px;
    width: 84px;
    height: 84px;
    background: #fff;
    border-radius: 6px;
    padding: 7px;
  }
  .qrbox svg { width: 100%; height: 100%; }

  /* ── Grey lower zone ── */
  .zone {
    flex: 1;
    margin-top: 26px;
    background: #f2f3f5;
    display: flex;
    flex-direction: column;
  }
  .zone .label {
    margin: 28px 24px 0;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #6f6f6f;
  }

  .doclist {
    background: #fff;
    border-radius: 16px;
    margin: 16px 18px 0;
    padding: 2px 18px;
  }
  .doc {
    display: flex;
    align-items: center;
    gap: 14px;
    height: 54px;
  }
  .doc + .doc { border-top: 1px solid #e8e8e8; }
  .doc svg { width: 22px; height: 22px; flex-shrink: 0; }
  .doc .dn { font-size: 15px; font-weight: 600; color: #16181c; }
  .doc .pill {
    margin-left: auto;
    font-size: 11.5px;
    font-weight: 600;
    border-radius: 999px;
    padding: 5px 13px;
  }
  .pill.ok { background: #dcf3dc; color: #3fa23f; }
  .pill.warn { background: #fdeacb; color: #df8a00; }

  .add-btn {
    margin: auto 20px 24px;
    height: 54px;
    border-radius: 16px;
    color: var(--ink);
    font-size: 17px;
  }
  .add-btn svg { width: 20px; height: 20px; }
</style>
</head>
<body>

        </svg>
      </div>
    </div>

    <!-- Grey document zone -->
    <div class="zone">
      <div class="label">ALL DOCUMENTS</div>

      <div class="doclist">

        <div class="doc">
          <svg viewBox="0 0 24 24" fill="#14213d"><path d="M2 7.5A2.5 2.5 0 0 1 4.5 5h15A2.5 2.5 0 0 1 22 7.5v9a2.5 2.5 0 0 1-2.5 2.5h-15A2.5 2.5 0 0 1 2 16.5z"/><rect x="5" y="9" width="6" height="2" rx="1" fill="#fff"/><rect x="5" y="13" width="9" height="2" rx="1" fill="#fff"/></svg>

      <div class="btn-primary add-btn">
