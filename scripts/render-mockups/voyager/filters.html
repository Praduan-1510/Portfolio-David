<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .screen { height: 986px; }
  .sheet { margin-top: 19px; }

  .fhead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 25px 36px 0 28px;
    height: 22px;
  }
  .fhead .t { font-size: 17px; font-weight: 700; color: var(--navy); }
  .fhead .reset { font-size: 14px; font-weight: 600; color: var(--orange); }

  .h2 {
    margin: 30px 28px 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.015em;
    line-height: 1;
    color: #666;
    text-transform: uppercase;
  }

  /* Budget slider */
  .slider-panel {
    margin: 22px 28px 0;
    height: 83px;
    background: #f6f6f6;
    border-radius: 16px;
    box-shadow: 0 7px 10px rgba(0, 0, 0, 0.09);
  }
  .prices {
    display: flex;
    justify-content: space-between;
    padding: 16px 24px 0;
    font-size: 19px;
    font-weight: 600;
    line-height: 19px;
    color: #565656;
  }
  .track { position: relative; height: 14px; margin: 14px 22px 0; }
  .track .rail {
    position: absolute;
    left: 0; right: 0; top: 3px;
    height: 8px;
    border-radius: 4px;
    background: #cdcdcd;
  }
  .track .fill {
    position: absolute;
    left: 45px; width: 136px; top: 3px;
    height: 8px;
    background: var(--orange);
  }
  .track .knob {
    position: absolute;
    top: 0;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #4e4e4e;
  }

  /* Chips */
  .chips {
    display: flex;
    gap: 11px;
    margin: 26px 17px 0;
  }
  .chips + .chips { margin-top: 14px; }
  .chip {
    height: 34px;
    border-radius: 17px;
    background: #e8e7e7;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 19px;
    font-size: 13px;
    font-weight: 600;
    color: #141414;
  }
  .chip.on { background: var(--orange); }
  .chip svg { width: 13px; height: 13px; }

  /* Inclusions */
  .incl {
    margin: 19px 28px 0;
    height: 123px;
    background: #f7f7f7;
    border-radius: 14px;
    padding: 11px 6px 0 9px;
  }
  .irow { display: flex; align-items: center; height: 34px; }
  .irow svg { width: 25px; height: 25px; margin-right: 10px; }
  .irow .l { font-size: 16px; font-weight: 500; color: #424242; }
  .tgl {
    margin-left: auto;
    position: relative;
    width: 41px;
    height: 18px;
    border-radius: 9px;
    background: var(--navy);
  }
  .tgl::after {
    content: "";
    position: absolute;
    top: 2.5px;
    right: 3px;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #ece8e8;
  }
  .tgl.off { background: #bebebe; }
  .tgl.off::after { right: auto; left: 3px; background: #efeceb; }

  .show-btn {
    margin: auto 39px 22px 37px;
    height: 34px;
    border-radius: 17px;
    background: var(--orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: #141414;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="sheet">
    <div class="fhead">
      <span class="t">Filters</span>
      <span class="reset">Reset all</span>
    </div>

    <div class="h2">Budget (Per Person)</div>
    <div class="slider-panel">
      <div class="prices"><span>$500</span><span>$4500</span></div>
      <div class="track">
        <div class="rail"></div>
        <div class="fill"></div>
        <div class="knob" style="left:38px"></div>
        <div class="knob" style="left:174px"></div>
      </div>
    </div>

    <div class="h2" style="margin-top:44px">Duration</div>
    <div class="chips">
      <div class="chip">1&ndash;3 Days</div>
      <div class="chip on">4&ndash;7 Days</div>
      <div class="chip">8&ndash;14 Days</div>
    </div>
    <div class="chips">
      <div class="chip">2+ Weeks</div>
    </div>

    <div class="h2" style="margin-top:42px">Travel Style</div>
    <div class="chips">
      <div class="chip on">Adventure</div>
      <div class="chip">Luxury</div>
      <div class="chip">Cultural</div>
    </div>
    <div class="chips">
      <div class="chip on">Beach</div>
      <div class="chip">Food &amp; Wine</div>
      <div class="chip">Family</div>
    </div>

    <div class="h2" style="margin-top:42px">Hotel Rating</div>
    <div class="chips">
      <div class="chip on">3
        <svg viewBox="0 0 24 24" fill="#141414"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8-6.1-3.4-6.1 3.4 1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
      </div>
      <div class="chip">4
        <svg viewBox="0 0 24 24" fill="#141414"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8-6.1-3.4-6.1 3.4 1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
      </div>
      <div class="chip">5
        <svg viewBox="0 0 24 24" fill="#141414"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8-6.1-3.4-6.1 3.4 1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
      </div>
    </div>

    <div class="h2" style="margin-top:43px">Inclusions</div>
    <div class="incl">
      <div class="irow">
        <svg viewBox="0 0 24 24" fill="none" stroke="#22262c" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
        <span class="l">Flights Included</span>
        <div class="tgl"></div>
      </div>
      <div class="irow">
        <svg viewBox="0 0 24 24" fill="none" stroke="#22262c" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
        <span class="l">Hotel Included</span>
        <div class="tgl"></div>
      </div>
      <div class="irow">
        <svg viewBox="0 0 24 24" fill="none" stroke="#22262c" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
        <span class="l">Transfers Included</span>
        <div class="tgl off"></div>
      </div>
    </div>

    <div class="show-btn">Show 148 Results</div>
  </div>
</div>
</body>
</html>
