<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .screen { height: 932px; }

  /* Dark header: back chevron + title, subtitle, orange rule */
  .head {
    height: 103px;
    display: flex;
    gap: 10px;
    padding: 36px 0 0 27px;
  }
  .head .back { margin-top: 13px; }
  .head .back svg { width: 25px; height: 25px; }
  .head .t { font-size: 24px; font-weight: 700; letter-spacing: 0.1px; color: #fff; }
  .head .s { margin-top: 4px; font-size: 13.5px; font-weight: 500; color: #9aa0ab; }
  .head .u { margin-top: 6px; width: 155px; height: 3px; border-radius: 2px; background: var(--orange); }

  /* Light sheet */
  .paper {
    background: #f4f4f4;
    border-radius: 0 0 28px 28px;
    margin: 0 14px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .balance {
    margin: 20px 19px 0 18px;
    height: 189px;
    border-radius: 16px;
    background: #dddee1;
    padding: 31px 21px 0;
    flex-shrink: 0;
  }
  .balance .r1 {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--orange);
  }
  .balance .big {
    margin-top: 7px;
    font-size: 37px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #191919;
  }
  .balance .r2 {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 500;
    color: #7e7e7e;
  }
  .track { margin-top: 8px; height: 6px; border-radius: 3px; background: #c9cbcf; overflow: hidden; }
  .fill { width: 62.5%; height: 100%; border-radius: 3px; background: var(--orange); }
  .toplat { margin-top: 9px; font-size: 15px; font-weight: 700; color: #191919; }

  .sect { margin: 8px 0 0 19px; font-size: 16.5px; font-weight: 600; color: #3e3e3e; }
  .sect.two { margin-top: 26px; }

  .grid {
    margin: 10px 19px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 11px;
  }
  .tile {
    background: #fff;
    border-radius: 24px;
    height: 109px;
    padding: 14px 16px 0 20px;
  }
  .tile svg { width: 25px; height: 25px; }
  .tile .tn { margin-top: 9px; font-size: 19px; font-weight: 700; letter-spacing: -0.2px; color: #131313; line-height: 1; }
  .tile .tp { margin-top: 12px; font-size: 17px; font-weight: 700; color: var(--orange); line-height: 1; }

  .act {
    margin: 8px 19px 0;
    background: #fff;
    border-radius: 18px;
    flex-shrink: 0;
  }
  .act .arow {
    height: 55px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 34px 0 39px;
  }
  .act .an { font-size: 18px; font-weight: 700; color: #111; }
  .act .div { border-top: 1px solid #dcdcdc; margin: 0 15px 0 18px; }
  .pill {
    height: 21px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 12.5px;
    font-weight: 700;
  }
  .pill.green { background: #dfffd4; color: #2fae1e; }
  .pill.amber { background: #ffefd4; color: #ce4e26; }

  .cta {
    margin: auto 23px 18px 25px;
    height: 50px;
    border-radius: 14px;
    background: var(--orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    font-weight: 700;
    color: #0b0b0b;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="head">
    <div class="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    </div>
    <div>
      <div class="t">Rewards</div>
      <div class="s">Gold Member &middot; 4,820 Points</div>
      <div class="u"></div>
    </div>
  </div>

  <div class="paper">
    <div class="balance">
      <div class="r1"><span>Points Balance</span><span>GOLD</span></div>
      <div class="big">4,820</div>
      <div class="r2"><span>Gold</span><span>Platinum (10,000)</span></div>
      <div class="track"><div class="fill"></div></div>
      <div class="toplat">5,180 Points To Platinum</div>
    </div>

    <div class="sect">Redeem Points</div>

    <div class="grid">
      <div class="tile">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="3"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
        <div class="tn">$50 Off</div>
        <div class="tp">500 Pts</div>
      </div>
      <div class="tile">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
        <div class="tn">Free Upgrade</div>
        <div class="tp">2,000 Pts</div>
      </div>
      <div class="tile">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M9 22v-4h6v4"/><path d="M9 6h.01"/><path d="M15 6h.01"/><path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M9 14h.01"/><path d="M15 14h.01"/></svg>
        <div class="tn">Free Night</div>
        <div class="tp">3,500 Pts</div>
      </div>
      <div class="tile">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        <div class="tn">$100 Off</div>
        <div class="tp">1,000 Pts</div>
      </div>
    </div>

    <div class="sect two">Recent Activity</div>

    <div class="act">
      <div class="arow">
        <div class="an">Paris Booking</div>
        <div class="pill green">+1,240 Pts</div>
      </div>
      <div class="div"></div>
      <div class="arow">
        <div class="an">Promo Code Used</div>
        <div class="pill amber">+500 Pts</div>
      </div>
    </div>

    <div class="cta">View All Rewards</div>
  </div>
</div>
</body>
</html>
